services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cuentitas}
      POSTGRES_USER: ${POSTGRES_USER:-cuentitas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cuentitas}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-cuentitas}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cuentitas}
      JWT_SECRET: ${JWT_SECRET}
      BOT_API_KEY: ${BOT_API_KEY:-}
      ADMIN_USER: ${ADMIN_USER:-Augusto}
      ADMIN_PASS: ${ADMIN_PASS}
      TZ: America/Argentina/Buenos_Aires
      DOMINIO: ${DOMINIO:-}
      DOLAR_API: ${DOLAR_API:-https://dolarapi.com/v1/dolares}
    expose:
      - "3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"
    networks:
      - default
      - caddy

volumes:
  pgdata:

networks:
  # Red existente donde corre Caddy (cookiehaus). Solo nos sumamos a ella;
  # no se modifica nada de ese proyecto. Permite que Caddy alcance a cuentitas-web-1.
  caddy:
    external: true
    name: cookiehaus_default
